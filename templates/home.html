{% extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block content %}
{% if user.is_authenticated %}
    <h1 class="text-3xl text-red-400 text-bold font-roboto">嗨! {{ user.username }}......</h1>
    <p><a href="{% url 'logout' %}">登出</a></p>
{% else %}
    <h1 class="text-3xl text-red-400 text-bold font-nototc">你尚未登錄</h1>
    <h1>
		<i class="fas fa-hamburger fa-2x pink"></i> Font<br> 
		<i class="fas fa-hamburger fa-5x fa-spin lime"></i> Awesome<br>
		<i class="fas fa-hamburger fa-10x gold"></i> v6<br> 
		<i class="fas fa-hamburger fa-lg aqua"></i> Free
	</h1>
    <a href="{% url 'login' %}">登錄</a> |
    <a href="{% url 'signup' %}">註冊</a>
{% endif %}
{% endblock %}
