{% extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block content %}
{% if user.is_authenticated %}
    <h1 class="text-3xl text-red-400 text-bold">嗨! {{ user.username }}......</h1>
    <p><a href="{% url 'logout' %}">登出</a></p>
{% else %}
    <h1 class="text-3xl text-red-400 text-bold">T你尚未登錄</h1>
    <a href="{% url 'login' %}">登錄</a> |
    <a href="{% url 'signup' %}">註冊</a>
{% endif %}
{% endblock %}
