{% extends "base.html" %}

{% block head_title %}
    Delete Post   
{% endblock head_title %}

{% block content %}
<div class="container mx-auto p-4">
    <div class="flex justify-center items-center min-h-screen">
        <div class="bg-white rounded-lg shadow-lg max-w-sm w-full p-6">
            <h2 class="text-xl font-bold mb-4">Confirm Delete</h2>
            <p class="mb-4 text-gray-700">Are you sure you want to delete "{{ post.title }}"? This action cannot be undone.</p>
            <form method="POST" action="{% url 'post_delete' post.pk %}">
                {% csrf_token %}
                <div class="flex justify-end space-x-4">
                    <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Delete</button>
                    <a href="{% url 'post_list' %}" class="bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
